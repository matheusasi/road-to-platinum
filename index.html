<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to Platinum</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #050914;
    background-image: radial-gradient(circle at 88% 12%, rgba(46,142,255,0.10), transparent 42%),
                       radial-gradient(circle at 8% 92%, rgba(0,217,192,0.06), transparent 38%);
    color: #eaf1ff;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
  }

  /* =======================================================================
     SLIDES — cada dashboard e um ".slide" empilhado no mesmo lugar. Um timer
     (ver JS) alterna qual esta ".ativo". Isso troca de dashboard SEM navegar,
     entao o fullscreen nunca cai. position:absolute empilha todos no mesmo
     espaco; opacity + visibility fazem o fade (com fallback pro snap seco caso
     o navegador da TV nao suporte transition).
     ======================================================================= */
  .slide {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    opacity: 0;
    visibility: hidden;
    -webkit-transition: opacity 0.6s ease;
    transition: opacity 0.6s ease;
  }

  .slide.ativo {
    opacity: 1;
    visibility: visible;
  }

  /* placeholder do proximo dashboard (ainda nao construido) */
  .placeholder {
    height: 100%;
    display: table;
    width: 100%;
    text-align: center;
  }

  .placeholder .centro {
    display: table-cell;
    vertical-align: middle;
  }

  .placeholder .titulo {
    font-size: 52px;
    font-weight: bold;
    color: #f5f8ff;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .placeholder .legenda {
    margin-top: 14px;
    font-size: 24px;
    color: #7c8fb3;
  }

  #topo {
    text-align: center;
    padding: 26px 20px 6px 20px;
  }

  #topo h1 {
    margin: 0;
    font-size: 46px;
    letter-spacing: 2px;
    color: #f5f8ff;
    text-transform: uppercase;
  }

  #topo .subtitulo {
    margin-top: 6px;
    font-size: 20px;
    color: #7c8fb3;
  }

  #areaGauge {
    text-align: center;
    padding-top: 6px;
  }

  #textoGaugeCentro {
    margin-top: -70px;
    font-size: 64px;
    font-weight: bold;
    color: #f5f8ff;
  }

  #textoGaugeValores {
    margin-top: 6px;
    font-size: 26px;
    color: #8a9bc0;
  }

  #textoGaugeValores .atual { color: #29e0c8; font-weight: bold; }
  #textoGaugeValores .meta  { color: #f5f8ff; font-weight: bold; }

  #grade {
    padding: 10px 40px 20px 40px;
  }

  .card {
    background-color: #0d1424;
    border: 2px solid rgba(46,142,255,0.25);
    border-radius: 16px;
    width: 22%;
    margin: 1.5%;
    padding: 24px 10px;
    float: left;
    box-sizing: border-box;
    text-align: center;
    box-shadow: 0 0 24px rgba(46,142,255,0.08);
  }

  .card .rotulo {
    font-size: 22px;
    color: #7c8fb3;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card .valor {
    font-size: 42px;
    font-weight: bold;
    color: #eaf1ff;
    white-space: nowrap;
  }

  .card .valor.sucesso  { color: #3ddc84; }
  .card .valor.alerta   { color: #ff6b6b; }
  .card .valor.atencao  { color: #ffb648; }
  .card .valor.neutro   { color: #eaf1ff; }
  .card .valor.encerrado { font-size: 30px; color: #7c8fb3; }

  .clearfix { clear: both; }
</style>
</head>
<body>

  <!-- ===================================================================
       SLIDE 1 — Road to Platinum. Comeca ".ativo" (primeiro a aparecer).
       =================================================================== -->
  <div class="slide ativo" data-slide="road-to-platinum">

    <div id="topo">
      <h1>Road to Platinum</h1>
      <div class="subtitulo">Progresso dos ultimos 12 meses</div>
    </div>

    <div id="areaGauge">
      <canvas id="gauge" width="900" height="480"></canvas>
      <div id="textoGaugeCentro">0%</div>
      <div id="textoGaugeValores">
        Atual: <span class="atual" id="valGaugeAtual">$0</span>
        &nbsp;&nbsp;/&nbsp;&nbsp;
        Meta: <span class="meta" id="valGaugeMeta">$0</span>
      </div>
    </div>

    <div id="grade">

      <div class="card">
        <div class="rotulo">Dias sem Vender</div>
        <div class="valor atencao" id="valDiasSemVender">0</div>
      </div>

      <div class="card">
        <div class="rotulo">Faltava Ontem</div>
        <div class="valor neutro" id="valFaltanteOntem">$0</div>
      </div>

      <div class="card">
        <div class="rotulo">Falta Hoje</div>
        <div class="valor neutro" id="valFaltanteHoje">$0</div>
      </div>

      <div class="card">
        <div class="rotulo">Necessario / Dia</div>
        <div class="valor neutro" id="valPorDia">$0</div>
      </div>

      <div class="clearfix"></div>
    </div>

  </div>

  <!-- ===================================================================
       SLIDE 2 — placeholder do proximo dashboard (ainda nao construido).
       Quando o novo dashboard existir, e so trocar o conteudo deste div.
       =================================================================== -->
  <div class="slide" data-slide="proximo">
    <div class="placeholder">
      <div class="centro">
        <div class="titulo">Proximo Dashboard</div>
        <div class="legenda">Em breve</div>
      </div>
    </div>
  </div>

<script>
  // =========================================================================
  // CONFIGURACAO
  //
  // O prazo (25/dez/2026) e o calculo de dias uteis restantes agora vivem
  // no workflow do n8n, nao aqui — mude por la se o prazo mudar.
  // =========================================================================

  var META_RECEITA = 750000; // USD

  // Quantos segundos cada dashboard fica na tela antes de trocar pro proximo.
  var SEGUNDOS_POR_SLIDE = 15;

  // =========================================================================
  // FONTE DE DADOS
  //
  // Este repositorio e PUBLICO (necessario pra ativar o GitHub Pages de
  // graca), entao os numeros de venda NUNCA ficam gravados aqui. Eles moram
  // no monday.com e sao servidos por um webhook do n8n, que ja calcula tudo
  // (incluindo dias uteis restantes) e devolve so o JSON pronto — o
  // dashboard busca direto de la, entre origens (CORS), sem passar pelo
  // GitHub.
  //
  // Usa XMLHttpRequest em vez de fetch() de proposito: navegadores de Smart
  // TV antigos (ex: Tizen 2014) costumam nao ter fetch()/Promise nativos.
  // =========================================================================

  var APPS_SCRIPT_URL = 'https://n8n-xymb.srv1709744.hstgr.cloud/webhook/road-to-platinum';

  function buscarDados(callback) {
    var xhr = new XMLHttpRequest();
    // cache-bust: sem isso, o navegador pode servir uma resposta antiga
    // em vez de buscar a mais recente do webhook
    xhr.open('GET', APPS_SCRIPT_URL + '?_=' + new Date().getTime(), true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          try {
            var dados = JSON.parse(xhr.responseText);
            callback(dados);
          } catch (erroParse) {
            if (window.console && console.error) console.error('Resposta do Apps Script invalida:', erroParse);
          }
        } else {
          if (window.console && console.error) console.error('Falha ao buscar dados, status:', xhr.status);
        }
      }
    };
    xhr.send();
  }

  // =========================================================================
  // UTILITARIOS
  //
  // Nota de compatibilidade: este arquivo evita de proposito recursos de JS
  // recentes (arrow functions, async/await, const/let, fetch, Promise nativa)
  // porque o alvo declarado e um navegador de Smart TV de 2014 (Tizen), que
  // nao suporta a maior parte disso — um erro de sintaxe nesses recursos
  // quebraria a pagina inteira, nao so a parte que os usa. Intl.NumberFormat
  // e Wake Lock sao usados quando o navegador suporta, com fallback manual
  // quando nao suporta.
  // =========================================================================

  var formatadorUSD = null;
  if (window.Intl && window.Intl.NumberFormat) {
    try {
      formatadorUSD = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
    } catch (e) {
      formatadorUSD = null;
    }
  }

  function formatarUSD(valor) {
    if (formatadorUSD) {
      return formatadorUSD.format(valor);
    }
    // fallback manual (sem Intl): separador de milhar na mao, sem centavos
    var inteiro = String(Math.round(valor));
    var negativo = inteiro.charAt(0) === '-';
    if (negativo) inteiro = inteiro.substring(1);
    var invertido = inteiro.split('').reverse().join('');
    var comVirgulas = invertido.replace(/(\d{3})(?=\d)/g, '$1,');
    var resultado = comVirgulas.split('').reverse().join('');
    return (negativo ? '-$' : '$') + resultado;
  }

  // =========================================================================
  // GAUGE (semicirculo) — desenhado em Canvas, sem depender de imagens/SVG
  // =========================================================================

  function corDoGauge(pct) {
    if (pct >= 1) return '#00d9c0';
    if (pct >= 0.6) return '#4da8ff';
    if (pct >= 0.3) return '#ffb648';
    return '#ff6b6b';
  }

  function desenharGauge(pct) {
    var canvas = document.getElementById('gauge');
    var ctx = canvas.getContext('2d');
    var w = canvas.width;
    var h = canvas.height;
    var cx = w / 2;
    var cy = h * 0.92;
    var raio = Math.min(w / 2, h) * 0.8;
    var espessura = 46;

    ctx.clearRect(0, 0, w, h);

    // trilha de fundo
    ctx.beginPath();
    ctx.arc(cx, cy, raio, Math.PI, 0, false);
    ctx.lineWidth = espessura;
    ctx.strokeStyle = '#111a2e';
    ctx.lineCap = 'round';
    ctx.stroke();

    // progresso
    var pctClamp = pct;
    if (pctClamp < 0) pctClamp = 0;
    if (pctClamp > 1) pctClamp = 1;

    if (pctClamp > 0) {
      var anguloFim = Math.PI + pctClamp * Math.PI;
      ctx.beginPath();
      ctx.arc(cx, cy, raio, Math.PI, anguloFim, false);
      ctx.lineWidth = espessura;
      ctx.strokeStyle = corDoGauge(pctClamp);
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  // =========================================================================
  // RENDERIZACAO
  // =========================================================================

  function corPorDiasSemVender(dias) {
    if (dias >= 3) return 'alerta';   // vermelho
    if (dias >= 1) return 'atencao';  // amarelo (1 ou 2 dias)
    return 'sucesso';                 // verde (0 dias)
  }

  function renderizarDashboard(dados) {
    var pct = dados.receitaAtual / META_RECEITA;
    var pctExibicao = Math.round(pct * 1000) / 10; // 1 casa decimal

    desenharGauge(pct);
    document.getElementById('textoGaugeCentro').innerHTML = pctExibicao + '%';
    document.getElementById('valGaugeAtual').innerHTML = formatarUSD(dados.receitaAtual);
    document.getElementById('valGaugeMeta').innerHTML = formatarUSD(META_RECEITA);

    // Cor guiada so pelos Dias sem Vender — "Dias sem Vender" e "Falta Hoje"
    // usam a MESMA cor: 0 dias = verde, 1-2 = amarelo, 3+ = vermelho (e fica
    // vermelho pra frente ate alguem registrar venda e zerar os dias).
    var classeCor = corPorDiasSemVender(dados.diasSemVender);

    var elDias = document.getElementById('valDiasSemVender');
    elDias.innerHTML = dados.diasSemVender;
    elDias.className = 'valor ' + classeCor;

    document.getElementById('valFaltanteOntem').innerHTML = formatarUSD(dados.receitaFaltanteOntem);

    var elFaltaHoje = document.getElementById('valFaltanteHoje');
    elFaltaHoje.innerHTML = formatarUSD(dados.receitaFaltanteHoje);
    elFaltaHoje.className = 'valor ' + classeCor;

    var elPorDia = document.getElementById('valPorDia');
    if (dados.receitaFaltanteHoje <= 0) {
      elPorDia.innerHTML = 'Meta atingida';
      elPorDia.className = 'valor encerrado';
    } else {
      elPorDia.innerHTML = formatarUSD(dados.necessarioPorDia);
      elPorDia.className = 'valor neutro';
    }
  }

  // =========================================================================
  // REQUISITO 2 — auto-refresh dos dados a cada 1 minuto, sem reload de pagina
  //
  // Este e o mecanismo PRINCIPAL de atualizacao. Um reload completo derruba
  // o fullscreen (nenhum navegador preserva fullscreen atraves de uma
  // navegacao real, nem o da TV) e, depois de recarregar, requestFullscreen()
  // exige um gesto do usuario pra funcionar de novo — que a TV nao tem
  // sozinha. Por isso a atualizacao de dados normal NUNCA navega: so troca o
  // texto na tela via XHR.
  // =========================================================================

  var ultimoSucesso = Date.now();

  function atualizarDados() {
    buscarDados(function (dados) {
      ultimoSucesso = Date.now();
      renderizarDashboard(dados);
    });
  }

  atualizarDados();
  setInterval(atualizarDados, 1 * 60 * 1000);

  // =========================================================================
  // ROTACAO DE DASHBOARDS (slides)
  //
  // Alterna qual ".slide" esta ".ativo" num ciclo, a cada SEGUNDOS_POR_SLIDE.
  // Nao navega nem recarrega — so troca a classe CSS — entao o fullscreen
  // continua intacto. Os dados do Road to Platinum seguem se atualizando por
  // baixo mesmo com o slide escondido, entao quando ele volta ja esta fresco.
  //
  // Pra adicionar mais um dashboard: crie outro <div class="slide"> no HTML.
  // Este codigo pega todos automaticamente, sem precisar mudar nada aqui.
  // =========================================================================

  var slides = document.getElementsByClassName('slide');
  var slideAtual = 0;

  function trocarSlide() {
    if (slides.length < 2) return; // com 1 so nao ha o que rotacionar
    slides[slideAtual].className = 'slide';
    slideAtual = (slideAtual + 1) % slides.length;
    slides[slideAtual].className = 'slide ativo';
  }

  setInterval(trocarSlide, SEGUNDOS_POR_SLIDE * 1000);

  // =========================================================================
  // REQUISITO 3 — reload completo APENAS se os dados pararem de atualizar.
  //
  // Nao existe mais reload programado por horario: todo reload sai do
  // fullscreen na TV (nenhum navegador re-entra em fullscreen sozinho depois
  // de uma navegacao, nem o dela) e a TV nao tem controle remoto por perto pra
  // tocar na tela de novo. Entao so recarrega em ULTIMO CASO: se 5 minutos
  // se passarem sem nenhuma atualizacao de dados bem-sucedida (sinal de que o
  // JS realmente travou), ai sim vale a pena pagar o preco de perder o
  // fullscreen pra sair do estado travado.
  // =========================================================================

  setInterval(function () {
    if (Date.now() - ultimoSucesso > 5 * 60 * 1000) {
      location.reload();
    }
  }, 1 * 60 * 1000);

  // =========================================================================
  // REQUISITO 4 — Wake Lock (manter tela ativa), quando suportado
  // =========================================================================

  function manterTelaAtiva() {
    if (navigator.wakeLock && navigator.wakeLock.request) {
      try {
        navigator.wakeLock.request('screen')['catch'](function () {
          // sem problema se falhar (ex: TV sem suporte real, so a API presente)
        });
      } catch (erro) {
        // sem problema se o navegador da TV nao suportar
      }
    }
  }

  manterTelaAtiva();

  // =========================================================================
  // REQUISITO 5 — auto-recuperacao de erro (recarrega sozinho se travar)
  // =========================================================================

  window.addEventListener('error', function () {
    setTimeout(function () {
      location.reload();
    }, 5000);
  });

  // =========================================================================
  // REQUISITO 1 — fullscreen automatico, com fallback pro primeiro clique/toque
  // =========================================================================

  function pedirTelaCheia() {
    var el = document.documentElement;
    var metodo = el.requestFullscreen ||
                 el.webkitRequestFullscreen ||
                 el.webkitRequestFullScreen ||
                 el.mozRequestFullScreen ||
                 el.msRequestFullscreen;

    if (!metodo) {
      armarFallbackDeClique();
      return;
    }

    try {
      var resultado = metodo.call(el);
      if (resultado && typeof resultado.then === 'function') {
        resultado['catch'](function () {
          armarFallbackDeClique();
        });
      }
    } catch (erro) {
      armarFallbackDeClique();
    }
  }

  function armarFallbackDeClique() {
    function aoClicar() {
      document.removeEventListener('click', aoClicar, false);
      pedirTelaCheia();
    }
    document.addEventListener('click', aoClicar, false);
  }

  window.addEventListener('load', function () {
    pedirTelaCheia();
    armarFallbackDeClique();
  });

  // =========================================================================
  // REQUISITO 6 — auto-recuperacao de fullscreen, caso saia por qualquer
  // motivo (nao so reload) sem ninguem por perto pra tocar na tela de novo.
  // =========================================================================

  function estaEmTelaCheia() {
    return !!(document.fullscreenElement ||
              document.webkitFullscreenElement ||
              document.mozFullScreenElement ||
              document.msFullscreenElement);
  }

  setInterval(function () {
    if (!estaEmTelaCheia()) {
      pedirTelaCheia();
    }
  }, 30 * 1000);
</script>

</body>
</html>
